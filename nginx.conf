# Configuration Nginx pour application Angular
events {
    worker_connections 1024;
}

http {
    # Inclure les types MIME par défaut
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Configuration du serveur
    server {
        listen 80;
        server_name localhost;

        # Dossier racine contenant les fichiers Angular
        root /usr/share/nginx/html;

        # Fichier d'index par défaut
        index index.html;

        # Configuration pour toutes les routes
        location / {
            # Essayer de servir le fichier demandé, sinon le dossier, sinon index.html
            try_files $uri $uri/ /index.html;
        }

        # Gestion des erreurs
        error_page 404 /index.html;

        # Configuration pour les fichiers statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
